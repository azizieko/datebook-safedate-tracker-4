name: SafeDate PHPUnit

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  phpunit:
    name: WP ${{ matrix.wordpress }} / PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php:
          - '7.4'
          - '8.1'
          - '8.2'
        wordpress:
          - '6.0'
          - 'latest'

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, xml, mbstring, mysqli, curl, zip, json, openssl, sodium
          tools: composer:v2
          coverage: none

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y subversion default-mysql-client curl wget unzip

      - name: Validate Composer file
        run: composer validate --no-check-publish --no-interaction

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install WordPress test suite
        run: bash scripts/install-wp-tests.sh wordpress_test root root 127.0.0.1 ${{ matrix.wordpress }} true

      - name: Lint plugin PHP
        run: |
          find . -path './vendor' -prune -o -name '*.php' -print -exec php -l {} \;

      - name: Confirm workflow file exists
        run: test -f .github/workflows/phpunit.yml

      - name: Run PHPUnit
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib
        run: |
          mkdir -p build/logs
          vendor/bin/phpunit -c phpunit.xml.dist --log-junit build/logs/phpunit-${{ matrix.wordpress }}-php-${{ matrix.php }}.xml

      - name: Generate CI evidence summary
        if: always()
        run: |
          mkdir -p build/evidence
          echo "# DateBook SafeDate Tracker v0.7.10 CI Evidence" > build/evidence/ci-evidence-v0.7.10.md
          echo "" >> build/evidence/ci-evidence-v0.7.10.md
          echo "- WordPress: ${{ matrix.wordpress }}" >> build/evidence/ci-evidence-v0.7.10.md
          echo "- PHP: ${{ matrix.php }}" >> build/evidence/ci-evidence-v0.7.10.md
          echo "- Run ID: ${{ github.run_id }}" >> build/evidence/ci-evidence-v0.7.10.md
          echo "- Run attempt: ${{ github.run_attempt }}" >> build/evidence/ci-evidence-v0.7.10.md
          echo "- Commit: ${{ github.sha }}" >> build/evidence/ci-evidence-v0.7.10.md
          echo "- Job status: ${{ job.status }}" >> build/evidence/ci-evidence-v0.7.10.md
          echo "- PHPUnit log: build/logs/phpunit-${{ matrix.wordpress }}-php-${{ matrix.php }}.xml" >> build/evidence/ci-evidence-v0.7.10.md

      - name: Upload PHPUnit result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phpunit-results-wp-${{ matrix.wordpress }}-php-${{ matrix.php }}
          path: build/logs/*.xml
          if-no-files-found: warn

      - name: Upload CI evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-evidence-v0.7.10-wp-${{ matrix.wordpress }}-php-${{ matrix.php }}
          path: build/evidence/*.md
          if-no-files-found: warn

  native-build-checks:
    name: Native starter static/build checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android starter Gradle check
        working-directory: native/android/SafeDateStarter
        run: |
          if [ -f ./gradlew ]; then
            chmod +x ./gradlew
            ./gradlew assembleDebug --no-daemon
          else
            echo "Gradle wrapper absent; static Kotlin check only"
          fi

      - name: Android starter static check
        run: |
          if grep -R -q "InMemoryCredentialStore()" native/android/SafeDateStarter/app/src/main/java; then
            echo "Insecure default credential store found"
            exit 1
          fi
          grep -R "versionName.*0.7.10" native/android/SafeDateStarter/app/build.gradle

      - name: iOS starter static check
        run: |
          grep -R "KeychainStore.save" native/ios/SafeDateStarter/SafeDateStarter
          grep -R "KeychainStore.loadCredentials" native/ios/SafeDateStarter/SafeDateStarter
          grep -R '"refresh_token"' native/ios/SafeDateStarter/SafeDateStarter/SafeDateApi.swift

      - name: Generate native evidence summary
        if: always()
        run: |
          mkdir -p build/evidence
          echo "# Native starter build evidence v0.7.10" > build/evidence/native-build-evidence-v0.7.10.md
          echo "" >> build/evidence/native-build-evidence-v0.7.10.md
          echo "- Run ID: ${{ github.run_id }}" >> build/evidence/native-build-evidence-v0.7.10.md
          echo "- Commit: ${{ github.sha }}" >> build/evidence/native-build-evidence-v0.7.10.md
          echo "- Job status: ${{ job.status }}" >> build/evidence/native-build-evidence-v0.7.10.md
          echo "- Android and iOS starter checks executed in CI." >> build/evidence/native-build-evidence-v0.7.10.md

      - name: Upload native evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-build-evidence-v0.7.10
          path: build/evidence/*.md
          if-no-files-found: warn
